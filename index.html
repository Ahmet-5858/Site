<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameHub58 | 58 Premium Oyun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <!-- AUTH SECTION -->
        <section id="auth-section" class="auth-container">
            <div class="auth-card glass">
                <div class="auth-header">
                    <h1 class="logo-text">GAMEHUB<span>58</span></h1>
                    <p class="subtitle">Eğlenceye girmek için oturum açın</p>
                </div>

                <div class="tabs">
                    <button id="tab-login" class="tab-btn active">Giriş Yap</button>
                    <button id="tab-register" class="tab-btn">Kayıt Ol</button>
                </div>

                <form id="auth-form">
                    <div class="input-group" id="name-group" style="display: none;">
                        <label for="username"><i class="fa-solid fa-user"></i> Kullanıcı Adı</label>
                        <input type="text" id="username" placeholder="Adınız">
                    </div>
                    <div class="input-group">
                        <label for="email"><i class="fa-solid fa-envelope"></i> E-posta</label>
                        <input type="email" id="email" required placeholder="ornek@email.com">
                    </div>
                    <div class="input-group">
                        <label for="password"><i class="fa-solid fa-lock"></i> Şifre</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" id="auth-submit" class="primary-btn">Giriş Yap</button>
                </form>
                <div id="auth-message" class="error-text"></div>
            </div>
        </section>

        <!-- DASHBOARD SECTION -->
        <section id="dashboard-section" class="dashboard-container hidden">
            <header class="main-header">
                <div class="logo">GAMEHUB<span>58</span></div>
                <div class="user-profile">
                    <span id="display-username">Misafir</span>
                    <button id="logout-btn" class="icon-btn" title="Çıkış Yap"><i
                            class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </header>

            <main class="games-grid" id="games-grid">
                <!-- Games will be injected here via JS -->
            </main>
        </section>

        <!-- GAME MODAL -->
        <div id="game-modal" class="modal hidden">
            <div class="modal-content glass">
                <button class="close-modal"><i class="fa-solid fa-xmark"></i></button>
                <h2 id="modal-title">Oyun Başlığı</h2>
                <div id="game-container" class="game-container">
                    <!-- Game content goes here -->
                </div>
            </div>
        </div>
    </div>

    <!-- TOASTS -->
    <div id="toast-container" class="toast-container"></div>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="assets/js/firebase-init.js"></script>
