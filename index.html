<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameHub58 | 58 Premium Oyun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="bg-gradient"></div>

    <div class="container">
        <section id="auth-section" class="auth-container">
            <div class="auth-card glass">
                <div class="auth-header">
                    <h1 class="logo-text">GAMEHUB<span>58</span></h1>
                    <p class="subtitle">Eğlenceye girmek için oturum açın</p>
                </div>
                <div class="tabs">
                    <button id="tab-login" class="tab-btn active">Giriş Yap</button>
                    <button id="tab-register" class="tab-btn">Kayıt Ol</button>
                </div>
                <form id="auth-form">
                    <div class="input-group" id="name-group" style="display: none;">
                        <label for="username"><i class="fa-solid fa-user"></i> Kullanıcı Adı</label>
                        <input type="text" id="username" placeholder="Adınız">
                    </div>
                    <div class="input-group">
                        <label for="email"><i class="fa-solid fa-envelope"></i> E-posta</label>
                        <input type="email" id="email" required placeholder="ornek@email.com">
                    </div>
                    <div class="input-group">
                        <label for="password"><i class="fa-solid fa-lock"></i> Şifre</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" id="auth-submit" class="primary-btn">Giriş Yap</button>
                </form>
                <div id="auth-message" class="error-text"></div>
            </div>
        </section>

        <section id="dashboard-section" class="dashboard-container hidden">
            <header class="main-header">
                <div class="logo">GAMEHUB<span>58</span></div>
                
                <div id="global-chat" class="glass" style="margin: 10px 0; padding: 10px; border-radius: 10px;">
                    <div id="sohbet-alani" style="height:150px; overflow-y:scroll; margin-bottom:10px; font-size: 0.9em;">
                        <div id="mesajlar"></div>
                    </div>
                    <div style="display: flex; gap: 5px;">
                        <input type="text" id="mesajInput" placeholder="Gruba mesaj yaz..." style="flex: 1; padding: 5px; border-radius: 5px; border: none;">
                        <button onclick="mesajGonder()" class="primary-btn" style="padding: 5px 15px; width: auto;">Gönder</button>
                    </div>
                </div>

                <div class="user-profile">
                    <span id="display-username">Misafir</span>
                    <button id="logout-btn" class="icon-btn" title="Çıkış Yap"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </header>

            <main class="games-grid" id="games-grid">
                </main>
        </section>

        <div id="game-modal" class="modal hidden">
            <div class="modal-content glass">
                <button class="close-modal"><i class="fa-solid fa-xmark"></i></button>
                <h2 id="modal-title">Oyun Başlığı</h2>
                <div id="game-container" class="game-container"></div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
      // Firebase Yapılandırman
      const firebaseConfig = {
        apiKey: "AIzaSyDTmGYVyDuiRg_bAZ_RO17HQGqm-hJa-h8",
        authDomain: "gamehub-91d29.firebaseapp.com",
        databaseURL: "https://gamehub-91d29-default-rtdb.firebaseio.com",
        projectId: "gamehub-91d29",
        storageBucket: "gamehub-91d29.firebasestorage.app",
        messagingSenderId: "67437817081",
        appId: "1:67437817081:web:9f80aaf2c5ec5fb51a4628",
        measurementId: "G-JXH6LZWHSX"
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();

      // Mesaj Gönderme (Firebase'e yazar, böylece herkes görür)
      function mesajGonder() {
        const input = document.getElementById("mesajInput");
        const kullanici = document.getElementById("display-username").innerText;
        if(input.value.trim() !== "") {
            db.ref("mesajlar").push({
                kullanici: kullanici,
                metin: input.value,
                tarih: Date.now()
            });
            input.value = "";
        }
      }

      // Mesajları Dinleme (Herkesin ekranında anında güncellenir)
      db.ref("mesajlar").limitToLast(20).on("child_added", (snapshot) => {
        const veri = snapshot.val();
        const mesajlarDiv = document.getElementById("mesajlar");
        mesajlarDiv.innerHTML += `<div style="margin-bottom:5px; color: white;"><b>${veri.kullanici}:</b> ${veri.metin}</div>`;
        document.getElementById("sohbet-alani").scrollTop = document.getElementById("sohbet-alani").scrollHeight;
      });
    </script>

    <script src="games/xox.js"></script>
    <script src="games/sos.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
