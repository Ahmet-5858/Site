<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModernBistro | Yönetim Paneli</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="assets/css/style.css"> <!-- Reusing some base styles -->
    <link rel="stylesheet" href="assets/css/admin.css"> <!-- Admin specific styles -->
</head>

<body class="admin-body">

    <!-- Admin Sidebar -->
    <aside class="admin-sidebar glass-card">
        <div class="logo admin-logo">
            <span class="logo-icon"><i class="fa-solid fa-utensils"></i></span>
            <span class="logo-text">Modern<span class="highlight">Bistro</span></span>
        </div>

        <nav class="admin-nav">
            <a href="#" class="active"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="#" id="menu-management-btn"><i class="fa-solid fa-list-ul"></i> Menü Yönetimi</a>
            <a href="index.html" class="return-site"><i class="fa-solid fa-arrow-left"></i> Siteye Dön</a>
        </nav>
    </aside>

    <!-- Admin Main Content -->
    <main class="admin-content">
        <header class="admin-header">
            <h2>Hoşgeldin, <span class="highlight">Admin</span></h2>
            <div class="header-actions">
                <button class="btn btn-primary" id="add-new-btn"><i class="fa-solid fa-plus"></i> Yeni Ürün
                    Ekle</button>
            </div>
        </header>

        <!-- Stats Overview -->
        <div class="stats-grid">
            <div class="stat-card glass-card">
                <div class="stat-icon"><i class="fa-solid fa-burger"></i></div>
                <div class="stat-info">
                    <h3 id="total-products">0</h3>
                    <p>Toplam Ürün</p>
                </div>
            </div>
            <div class="stat-card glass-card">
                <div class="stat-icon"><i class="fa-solid fa-tags"></i></div>
                <div class="stat-info">
                    <h3 id="total-categories">0</h3>
                    <p>Aktif Kategori</p>
                </div>
            </div>
        </div>

        <!-- Product List Table -->
        <section class="admin-table-section glass-card">
            <div class="table-header">
                <h3>Güncel Menü Listesi</h3>
            </div>

            <div class="table-responsive">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Görsel</th>
                            <th>Ürün Adı</th>
                            <th>Kategori</th>
                            <th>Fiyat</th>
                            <th>İndirim</th>
                            <th>İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="admin-product-list">
                        <!-- Dynamic rows injected here -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <!-- Product Form Modal -->
    <div id="product-modal" class="modal-overlay hidden">
        <div class="modal-content glass-card">
            <button class="close-btn" id="close-modal"><i class="fa-solid fa-xmark"></i></button>
            <h3 id="modal-title">Yeni Ürün Ekle</h3>

            <form id="product-form">
                <input type="hidden" id="product-id">

                <div class="input-group">
                    <label>Ürün Adı</label>
                    <input type="text" id="product-name" required placeholder="Örn: Trüf Mantarlı Burger">
                </div>

                <div class="input-group">
                    <label>Açıklama (İçerik)</label>
                    <textarea id="product-desc" required placeholder="Malzemeleri veya detayları yazın..."></textarea>
                </div>

                <div class="form-row">
                    <div class="input-group half">
                        <label>Fiyat (₺)</label>
                        <input type="number" id="product-price" required min="1" step="0.01">
                    </div>

                    <div class="input-group half">
                        <label>İndirim Oranı (%)</label>
                        <input type="number" id="product-discount" value="0" min="0" max="100">
                    </div>
                </div>

                <div class="input-group">
                    <label>Kategori</label>
                    <input type="text" id="product-category" required placeholder="Ana Yemek, İçecek vb."
                        list="cat-suggestions">
                    <datalist id="cat-suggestions"></datalist>
                </div>

                <div class="input-group">
                    <label>Görsel Linki (URL)</label>
                    <input type="url" id="product-image" placeholder="https://example.com/image.jpg">
                    <small style="color:var(--text-muted)">* Boş bırakılırsa hazır avatar kullanılır.</small>
                </div>

                <button type="submit" class="btn btn-primary" style="margin-top: 1rem; width: 100%;">Kaydet</button>
            </form>
        </div>
    </div>

    <script src="assets/js/db.js"></script>
    <script src="assets/js/admin.js"></script>
</body>

</html>
